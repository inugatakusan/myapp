<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Tasks</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="panel left-panel">
            <div class="header-row">
                <span class="pixel-label">. CALENDAR</span>
            </div>
            
            <div class="clock-section">
                <div class="pixel-clock">----/--/--</div>
                <div class="pixel-date">--- / ---</div>
            </div>
        </div>

        <div class="panel right-panel">
            <div class="header-row">
                <span class="pixel-label">. TASKS</span>
                <button type="button" class="clean-button" id="btn-clean" title="Clear completed">CLEAN</button>
            </div>

            <div class="task-list"></div>

            <div class="input-area-wrapper">
                <div class="input-section">
                    <div class="priority-selector">
                        <button type="button" class="priority-btn high active" data-priority="HIGH">HIGH</button>
                        <button type="button" class="priority-btn mid" data-priority="MID">MID</button>
                        <button type="button" class="priority-btn low" data-priority="LOW">LOW</button>
                    </div>

                    <input type="text" placeholder="Add new task..." class="pixel-input">
                    <button class="add-button">+</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
